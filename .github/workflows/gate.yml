# Pushes and pull requests run the repository-local gate. A manual integration snapshot adds the
# canon sibling so contract and transformation-fixture drift checks can execute.
name: gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      canon_ref:
        description: suspec ref for an integration snapshot
        required: false
        default: main
      skills_ref:
        description: suspec-skills ref for an integration snapshot
        required: false
        default: main
      agents_ref:
        description: suspec-agents ref for an integration snapshot
        required: false
        default: main
      mcp_ref:
        description: suspec-mcp ref for an integration snapshot
        required: false
        default: main

permissions:
  contents: read

jobs:
  local-gate:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gate
        working-directory: repo
        run: |
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm gate

  integration-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUSPEC_CANON: "${{ github.workspace }}/suspec"
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: jcosta33/suspec
          ref: "${{ inputs.canon_ref || 'main' }}"
          path: suspec
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Integration gate
        working-directory: repo
        run: |
          test -f "$SUSPEC_CANON/checks/checks.yaml"
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm gate

  method-gates:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - { name: suspec-cli, uses: actions/checkout@v4, with: { path: family/suspec-cli } }
      - { name: suspec, uses: actions/checkout@v4, with: { repository: jcosta33/suspec, ref: "${{ inputs.canon_ref || 'main' }}", path: family/suspec } }
      - { name: suspec-skills, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-skills, ref: "${{ inputs.skills_ref || 'main' }}", path: family/suspec-skills } }
      - { name: suspec-agents, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-agents, ref: "${{ inputs.agents_ref || 'main' }}", path: family/suspec-agents } }
      - { name: suspec-mcp, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-mcp, ref: "${{ inputs.mcp_ref || 'main' }}", path: family/suspec-mcp } }

      - name: Method gates
        run: sh family/suspec/scripts/lint-all.sh "$GITHUB_WORKSPACE/family"
